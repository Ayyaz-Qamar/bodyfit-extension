<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BodyFit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    
    <header>
      <h1>BodyFit</h1>
      <p class="tagline">AI Shirt Size Recommender</p>
    </header>

    <main>
      <div class="upload-section">
        <label for="image-input" class="upload-label">
          <span id="upload-text">📷 Upload your photo</span>
          <span class="upload-hint">(full body, front view)</span>
        </label>
        <input type="file" id="image-input" accept="image/jpeg,image/jpg,image/png">
        <div id="image-preview-container" class="hidden">
          <img id="image-preview" alt="Preview">
        </div>
      </div>

      <div class="form-section">
        <div class="input-group">
          <label for="height-input">Your height (cm)</label>
          <input type="number" id="height-input" placeholder="e.g., 170" min="100" max="220">
        </div>

        <div class="input-group">
          <label for="gender-select">Gender</label>
          <select id="gender-select">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
      </div>

      <button id="detect-btn" class="primary-btn">Detect My Size</button>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Analyzing your photo...</p>
      </div>

      <div id="error-message" class="hidden error"></div>

      <div id="results" class="hidden">
        <div class="size-result">
          <p class="result-label">Recommended Size</p>
          <h2 id="recommended-size">—</h2>
          <p id="confidence" class="confidence">—</p>
        </div>

        <div class="measurements">
          <h3>Your Measurements</h3>
          <div id="measurements-list"></div>
        </div>

        <div id="fit-advice" class="fit-advice"></div>

        <button id="reset-btn" class="secondary-btn">Try Another Photo</button>
      </div>
    </main>

    <footer>
      <p class="footer-text">Powered by AI Pose Detection</p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
